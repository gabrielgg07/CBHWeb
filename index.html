    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600;1,700&family=Josefin+Sans:wght@200;300;400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --nav-bg: #06090f;
      --nav-height: 64px;
      --teal: #3bbfcc;
      --coral: #e8674a;
      --deep: #060d17;
      --fog: #c8d8e2;
      --white: #f2eeea;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'Josefin Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--deep);
      color: var(--white);
      font-family: var(--font-ui);
      overflow-x: hidden;
    }

    /* ── NAV ───────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: var(--nav-height);
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      border-bottom: 1px solid rgba(59, 191, 204, 0.15);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* Logo placeholder – swap for your <img> */
    .nav-logo-img {
      height: 40px;        /* control size */
      width: auto;         /* keeps aspect ratio */
      object-fit: contain; /* prevents cropping */
      border-radius: 0;    /* remove circle */
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--white);
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 11.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.2s, color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--teal);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .nav-links a:hover { opacity: 1; color: var(--teal); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-socials {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-socials a {
      color: rgba(242,238,234,0.65);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .nav-socials a:hover { color: var(--teal); }

    .nav-socials svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* ── HERO ──────────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 115vh; /* extra height = scroll room to see full photo */
      min-height: 700px;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      /* slight blue/teal grade over the photo */
      filter: saturate(0.92) brightness(0.82);
    }

    /* layered dark-to-transparent overlays for depth */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(6,9,15,0.55) 0%,
          rgba(6,9,15,0.1) 30%,
          rgba(6,9,15,0.1) 60%,
          rgba(6,9,15,0.7) 100%
        ),
        linear-gradient(
          135deg,
          rgba(6,30,60,0.25) 0%,
          transparent 60%,
          rgba(59,191,204,0.06) 100%
        );
    }

    /* faint scanline texture for that moody live-photo feel */
    .hero-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
    }

    .hero-content {
      position: absolute;
      inset: 0;
      padding-top: var(--nav-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    /* ── BAND NAME ─────────────────────────────────────────── */
    .band-name-wrap {
      display: block;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      /* drop-shadow to lift it off the photo */
      filter: drop-shadow(0 4px 32px rgba(0,0,0,0.7));
      margin-bottom: 0;
    }

    /* Swap this entire block for your <img src="logo.png" /> if you have a logo file */
    .band-name {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 700;
      font-size: clamp(62px, 9vw, 130px);
      line-height: 0.88;
      letter-spacing: -0.01em;
      text-align: center;

      /* oceanic-to-coral gradient matching both photo palettes */
      background: linear-gradient(
        135deg,
        #c8eef4 0%,
        #3bbfcc 25%,
        #e0f2f5 50%,
        #e8674a 75%,
        #f2a07a 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 6s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* logo placeholder note — remove once you add real logo */
    .logo-placeholder-note {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-top: 6px;
      display: none; /* hidden by default, shown if you need guidance */
    }

    /* ── CTA BUTTONS ───────────────────────────────────────── */
    .hero-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 0px;
    }

    .btn {
      display: inline-block;
      padding: 12px 44px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 100px;
      transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
      cursor: pointer;
      min-width: 240px;
      text-align: center;
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(242,238,234,0.7);
      backdrop-filter: blur(6px);
    }

    .btn-outline:hover {
      background: var(--teal);
      border-color: var(--teal);
      color: var(--deep);
      transform: translateY(-2px);
    }

    .btn-outline.coral:hover {
      background: var(--coral);
      border-color: var(--coral);
      color: var(--white);
    }

    /* ── SCROLL HINT ───────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.45;
      animation: fadeInUp 1.8s ease forwards, bob 2.5s ease-in-out 2s infinite;
    }

    .scroll-hint span {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 0.45; transform: translateX(-50%) translateY(0); }
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(5px); }
    }

    /* ── ENTRY ANIMATIONS ──────────────────────────────────── */
    .hero-content > * {
      opacity: 0;
      animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .hero-content > *:nth-child(1) { animation-delay: 0.3s; }
    .hero-content > *:nth-child(2) { animation-delay: 0.55s; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BELOW-FOLD TEASE ──────────────────────────────────── */
    .below-hero {
      background: var(--deep);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(59,191,204,0.08);
    }

    .below-hero p {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 18px;
      color: rgba(200,216,226,0.3);
      letter-spacing: 0.06em;
    }

    .nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
}

.nav-mobile-drawer {
  display: none;
  position: fixed;
  top: 60px; left: 0; right: 0;
  background: var(--navy);
  border-bottom: 2px solid var(--orange);
  z-index: 190;
  padding: 1.5rem 2rem;
  flex-direction: column;
  gap: 1.2rem;
}

  .nav-mobile-drawer.open { display: flex; }

  .nav-mobile-drawer a {
    color: var(--white);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .nav-mobile-socials {
    display: flex;
    gap: 1.2rem;
    padding-top: 0.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .nav-mobile-socials a {
    color: var(--white);
    opacity: 0.7;
    display: flex;
  }

  .nav-mobile-socials svg {
    width: 17px;
    height: 17px;
    fill: currentColor;
  }

  @media (max-width: 768px) {
    .nav-links,
    .nav-socials { display: none; }
    .nav-hamburger { display: flex; }
  }

    @media (max-width: 480px) {
      .photos-grid { grid-template-columns: 1fr 1fr; }
      .tagline-text { font-size: 0.85rem; letter-spacing: 0.08em; }
      .content-wrap { padding: 0 1.25rem; }
    }
  </style>
