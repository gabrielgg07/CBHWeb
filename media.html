<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Media — Coral Bank Hollow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:    #162d47;
      --orange:  #e8943a;
      --cyan:    #7dd3e8;
      --white:   #f5f0e8;
      --muted:   rgba(245,240,232,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0d0d0d;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       NAV
    ══════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--navy);
      border-bottom: 2px solid var(--orange);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }

    .nav-logo-placeholder {
      height: 36px; padding: 0 12px;
      border: 2px dashed rgba(232,148,58,0.5); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; letter-spacing: 0.1em;
      color: rgba(232,148,58,0.6); text-transform: uppercase; white-space: nowrap;
    }

    .nav-links { display: flex; align-items: center; gap: 1.8rem; list-style: none; }

    .nav-links a {
      color: var(--white); text-decoration: none;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      position: relative; transition: color 0.2s;
    }

    .nav-links a::after {
      content: ''; position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--orange);
      transform: scaleX(0); transition: transform 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--orange); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    .nav-socials { display: flex; align-items: center; gap: 0.9rem; flex-shrink: 0; }

    .nav-socials a {
      color: var(--white); opacity: 0.7; text-decoration: none;
      display: flex; align-items: center; transition: opacity 0.2s, color 0.2s;
    }

    .nav-socials a:hover { opacity: 1; color: var(--cyan); }
    .icon { width: 17px; height: 17px; fill: currentColor; }

    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px; background: none; border: none;
    }

    .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--white); }

    .nav-mobile-drawer {
      display: none; position: fixed;
      top: 60px; left: 0; right: 0;
      background: var(--navy); border-bottom: 2px solid var(--orange);
      z-index: 190; padding: 1.5rem 2rem; flex-direction: column; gap: 1.2rem;
    }

    .nav-mobile-drawer.open { display: flex; }

    .nav-mobile-drawer a {
      color: var(--white); text-decoration: none;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    .nav-mobile-socials {
      display: flex; gap: 1.2rem;
      padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1);
    }

    .nav-mobile-socials a { color: var(--white); opacity: 0.7; display: flex; }

    /* ══════════════════════════════
       PAGE
    ══════════════════════════════ */
    .media-page {
      padding-top: 60px;
      min-height: 100vh;
    }

    /* ── Heading ── */
    .media-heading {
      text-align: center;
      padding: 3.5rem 1.5rem 2.5rem;
    }

    .media-heading h1 {
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.3;
    }

    .media-heading h1 span {
      color: var(--orange);
    }

    .media-heading p {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .media-heading p a {
      color: var(--orange);
      text-decoration: none;
    }

    .media-heading p a:hover { text-decoration: underline; }

    /* ── Behold widget container ── */
    .behold-wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 5rem;
    }

    .nav-logo-img {
      height: 40px;        /* control size */
      width: auto;         /* keeps aspect ratio */
      object-fit: contain; /* prevents cropping */
      border-radius: 0;    /* remove circle */
      display: block;
    }

    /*
      Behold renders its own grid — no extra CSS needed.
      The widget fills this container automatically.
    */

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 768px) {
      nav { padding: 0 1.25rem; }
      .nav-links, .nav-socials { display: none; }
      .nav-hamburger { display: flex; }
      .media-heading { padding: 2.5rem 1.25rem 2rem; }
    }
  </style>

    hamburger.addEventListener('click', () => drawer.classList.toggle('open'));
    drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => drawer.classList.remove('open')));
