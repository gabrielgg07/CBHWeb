  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #162d47;
      --orange:     #e8943a;
      --orange-dark:#c97930;
      --cyan:       #7dd3e8;
      --white:      #f5f0e8;
      --muted:      rgba(245,240,232,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0d0d0d;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       NAV
    ══════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--navy);
      border-bottom: 2px solid var(--orange);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }

    .nav-logo-placeholder {
      height: 36px; padding: 0 12px;
      border: 2px dashed rgba(232,148,58,0.5); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; letter-spacing: 0.1em;
      color: rgba(232,148,58,0.6); text-transform: uppercase; white-space: nowrap;
    }

    .nav-links { display: flex; align-items: center; gap: 1.8rem; list-style: none; }

    .nav-links a {
      color: var(--white); text-decoration: none;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      position: relative; transition: color 0.2s;
    }

    .nav-links a::after {
      content: ''; position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--orange);
      transform: scaleX(0); transition: transform 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--orange); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    .nav-socials { display: flex; align-items: center; gap: 0.9rem; flex-shrink: 0; }

    .nav-socials a {
      color: var(--white); opacity: 0.7; text-decoration: none;
      display: flex; align-items: center; transition: opacity 0.2s, color 0.2s;
    }

    .nav-socials a:hover { opacity: 1; color: var(--cyan); }
    .icon { width: 17px; height: 17px; fill: currentColor; }

    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px; background: none; border: none;
    }

    .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--white); }

    .nav-mobile-drawer {
      display: none; position: fixed;
      top: 60px; left: 0; right: 0;
      background: var(--navy); border-bottom: 2px solid var(--orange);
      z-index: 190; padding: 1.5rem 2rem; flex-direction: column; gap: 1.2rem;
    }

    .nav-mobile-drawer.open { display: flex; }

    .nav-mobile-drawer a {
      color: var(--white); text-decoration: none;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    .nav-mobile-socials {
      display: flex; gap: 1.2rem;
      padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1);
    }

    .nav-mobile-socials a { color: var(--white); opacity: 0.7; display: flex; }

    /* ══════════════════════════════
       FULL-PAGE HERO
    ══════════════════════════════ */
    .music-page {
      position: relative;
      min-height: 100vh;
      padding-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background band photo */
    .music-bg {
      position: fixed;
      inset: 60px 0 0 0;
      z-index: 0;
    }

    .music-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 30%;
      filter: brightness(0.38) saturate(0.4);
    }

    /* Photo placeholder */
    .music-bg-placeholder {
      width: 100%; height: 100%;
      background: #111820;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
    }

    .music-bg-placeholder svg { opacity: 0.1; }
    .music-bg-placeholder span {
      font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; opacity: 0.25;
    }

    /* Dark gradient at bottom */
    .music-bg-fade {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(to top, #0d0d0d 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ══════════════════════════════
       CONTENT
    ══════════════════════════════ */
    .music-content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 680px;
      padding: 3rem 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Title */
    .music-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .music-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--orange);
      text-align: center;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7);
      margin-bottom: 0.35rem;
    }

    .music-release-name {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--white);
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      margin-bottom: 2rem;
    }

    /* ── Spotify embed ── */
    .embed-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .embed-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* Placeholder shown when no iframe src is set */
    .embed-placeholder {
      width: 100%;
      background: rgba(22,45,71,0.85);
      border: 1px dashed rgba(232,148,58,0.35);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .embed-placeholder .ep-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.5; }

    .embed-placeholder p {
      font-size: 0.72rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .embed-placeholder code {
      font-size: 0.65rem;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      color: var(--cyan);
    }

    /* ── Apple Music embed ── */
    .apple-embed-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.6rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .apple-embed-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── Platform buttons ── */
    .platform-btns {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      width: 100%;
    }

    .btn-platform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: min(340px, 100%);
      padding: 0.8rem 2rem;
      border-radius: 999px;
      border: 2px solid rgba(245,240,232,0.7);
      background: transparent;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
      backdrop-filter: blur(6px);
    }

    .btn-platform:hover {
      transform: translateY(-2px);
    }

    .btn-spotify:hover {
      background: #1DB954;
      border-color: #1DB954;
      color: #000;
    }

    .btn-apple:hover {
      background: #fc3c44;
      border-color: #fc3c44;
      color: #fff;
    }

    .nav-logo-img {
      height: 40px;        /* control size */
      width: auto;         /* keeps aspect ratio */
      object-fit: contain; /* prevents cropping */
      border-radius: 0;    /* remove circle */
      display: block;
    }

    .btn-platform svg { flex-shrink: 0; }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 768px) {
      nav { padding: 0 1.25rem; }
      .nav-links, .nav-socials { display: none; }
      .nav-hamburger { display: flex; }
    }

    @media (max-width: 480px) {
      .music-content { padding: 2rem 1rem 4rem; }
    }
  </style>
